<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Mời Lễ Tốt Nghiệp · Lâm Cẩm Thu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="global-loader" class="fullscreen-loader" style="display: none;">
        <div class="loader-content">
            <div class="premium-spinner"></div>
            <p class="loader-text" data-i18n="loading_text">Đang tải dữ liệu...</p>
        </div>
    </div>
    <div id="welcome-screen">
        <div class="welcome-wing left-wing"></div>
        <div class="welcome-wing right-wing"></div>
        <div class="welcome-content">
            <div class="welcome-title">LỄ TỐT NGHIỆP</div>
            <div class="welcome-names">
                Lâm Cẩm Thu
            </div>
            <button id="btn-open-wedding" class="btn-open">MỞ THIỆP MỜI</button>
        </div>
    </div>
    <audio id="bgMusic" loop>
        <source src="assets/music/bg-music.mp3" type="audio/mpeg">
    </audio>

    <button id="musicToggle" class="music-btn" aria-label="Toggle Music">
        <svg class="icon-music" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
        </svg>
        <div class="music-waves">
            <span></span><span></span><span></span>
        </div>
    </button>
    <nav id="nav-dots" aria-label="Section navigation">
        <button class="dot active" data-s="0" aria-label="Section 0"></button>
        <button class="dot" data-s="1" aria-label="Section 1"></button>
        <button class="dot" data-s="2" aria-label="Section 2"></button>
        <button class="dot" data-s="3" aria-label="Section 3"></button>
        <button class="dot" data-s="4" aria-label="Section 4"></button>
        <button class="dot" data-s="5" aria-label="Section 5"></button>
        <button class="dot" data-s="6" aria-label="Section 6"></button>
        <button class="dot" data-s="7" aria-label="Section 7"></button>
    </nav>

    <div id="toast" role="status" aria-live="polite"></div>

    <section class="section" data-s="0">
        <div class="bg-cover"></div>
        <div class="s0-content-modern reveal visible">
            <div class="graduation-icon">🎓</div>
            <h2 class="section-title-modern lang-title" data-i18n="card_welcome"></h2>
            <h1 class="main-card-title" data-i18n="card_title"></h1>
            <p class="lang-subtitle" data-i18n="card_sub_title"></p>
            <div class="lang-box">
                <p class="lang-box-label" data-i18n="choose_lang"></p>
                <div class="lang-group">
                    <button class="lang-btn" data-lang="vi">
                        <img src="/assets/image/vi.png" alt="Vietnamese" class="flag" >
                        <span data-i18n="lang_vi"></span>
                    </button>

                    <button class="lang-btn" data-lang="fr">
                        <img src="/assets/image/fr.png" alt="French" class="flag" >
                        <span data-i18n="lang_fr"></span>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <section class="section" data-s="1" id="s1">
        <div class="bg-cover"></div>
        <div class="s1-content-modern reveal">
            <div class="hero-text">
                <p class="eyebrow" data-i18n="hero_title"></p>
                <h2 class="highlight-name">Lâm Cẩm Thu</h2>
                
                <div class="info-meta-block">
                    <div class="meta-item">
                        <span class="meta-icon">🎓</span>
                        <div class="meta-text">
                            <strong data-i18n="hero_class"></strong>
                            <p data-i18n="hero_role"></p>
                        </div>
                    </div>
                    <div class="meta-item">
                        <span class="meta-icon">📍</span>
                        <div class="meta-text">
                            <strong data-i18n="label_school_name"></strong>
                            <p data-i18n="label_school_address"></p>
                        </div>
                    </div>
                </div>

            </div>
            
            <div class="hero-portrait">
                <div class="portrait-frame">
                    <img src="https://lh3.googleusercontent.com/pw/AP1GczPArpapbw6qKZ9Anm7i_S5haI31NrrlH2qYoANoqlzsICgndD9U8ru4TS2yDCF_5pGvstlHFv4u2ryL92mYrcDFckojPMX53aajxIpwI8WbwUFgthkDR5Z1JbzCj7m8_bSIuQrjVUgkkOb3jnNH91KT=w753-h1053-s-no-gm?authuser=0" alt="Lâm Cẩm Thu" class="portrait-img">
                </div>
            </div>
        </div>
    </section>

    <section class="section" data-s="2" id="s2">
        <div class="bg-cover"></div>
        <div class="s2-content-modern reveal">
            <h2 class="section-global-title" data-i18n="label_information"></h2>
            <div class="calendar-layout">
                <div class="time-details-top">
                    <div class="time-col">
                        <span class="detail-label" data-i18n="date_label"></span>
                        <strong id="date-value">05.07.2026</strong>
                    </div>
                    <div class="time-col">
                        <span class="detail-label" data-i18n="time_label"></span>
                        <strong id="time-value">10:30 AM</strong>
                    </div>
                </div>
                <div class="calendar-widget">
                    <div class="calendar-month" id="calendar-month-val" data-i18n="calendar_month"></div>
                    <div class="calendar-days-header">
                        <div data-i18n="day_t2">T2</div>
                        <div data-i18n="day_t3">T3</div>
                        <div data-i18n="day_t4">T4</div>
                        <div data-i18n="day_t5">T5</div>
                        <div data-i18n="day_t6">T6</div>
                        <div data-i18n="day_t7">T7</div>
                        <div data-i18n="day_cn">CN</div>
                    </div>
                    <div class="calendar-cells">
                        <div class="empty"></div><div class="empty"></div><div>1</div><div>2</div><div>3</div><div>4</div>
                        <div class="marked-day">5</div>
                        <div>6</div><div>7</div><div>8</div><div>9</div><div>10</div><div>11</div><div>12</div>
                        <div>13</div><div>14</div><div>15</div><div>16</div><div>17</div><div>18</div><div>19</div>
                        <div>20</div><div>21</div><div>22</div><div>23</div><div>24</div><div>25</div><div>26</div>
                        <div>27</div><div>28</div><div>29</div><div>30</div><div>31</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="section" data-s="3" id="s3">
        <div class="bg-cover"></div>
        <div class="s3-content-modern reveal">
            <h2 class="section-global-title" data-i18n="calendar_month"></h2>
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.651111111111!2d106.6791111111111!3d10.76111111111111!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31752f1111111111%3A0x1111111111111111!2zVHLGsOG7nW5nIMSQ4bqhaSBo4buNYyBTxrAgcGjhuqFtIFRQLkhDTQ!5e0!3m2!1svi!2s!4v1625000000000" allowfullscreen="" loading="lazy"></iframe>
            </div>
            <h3 class="location-name" data-i18n="label_school_name"></h3>
            <p class="location-address" data-i18n="label_school_address"></p>
        </div>
    </section>

    <section class="section" data-s="4" id="s4">
        <div class="bg-cover"></div>
        <div class="s4-content-modern reveal">
            <h2 class="section-global-title" data-i18n="dress_label"></h2>
            <h3 class="countdown-celebrate-title" data-i18n="countdown_title"></h3>
            <div class="countdown-grid" id="countdown-timer">
                <div class="countdown-card">
                    <span class="countdown-num" id="days">04</span>
                    <span class="countdown-label" data-i18n="lbl_days"></span>
                </div>
                <div class="countdown-card">
                    <span class="countdown-num" id="hours">14</span>
                    <span class="countdown-label" data-i18n="lbl_hours"></span>
                </div>
                <div class="countdown-card">
                    <span class="countdown-num" id="minutes">34</span>
                    <span class="countdown-label" data-i18n="lbl_minutes"></span>
                </div>
            </div>
        </div>
    </section>

    <section class="section" data-s="5" id="s5">
        <div class="bg-cover"></div>
        <div class="s5-content-modern reveal">
            <h2 class="section-global-title" data-i18n="gallery_title">✦ KHOẢNH KHẮC THANH XUÂN ✦</h2>
            <div class="gallery-grid">
                
                <div class="gallery-item"><img src="https://lh3.googleusercontent.com/pw/AP1GczM7gugPKYVsgtaDBPepHmLn9YzNxsMXVvcZgcSeSujCBMEls5i_tdy73YOM2Vch56KeLr6GDtE5STE4X_jlAhVFLbLxXMgGWpItx8jZzKmqVXrQEqV6upvI78_eIjFZMfewr_VkGoxm_vP2mT7tlC8p=w702-h1053-s-no-gm?authuser=0" alt="Youth 1"></div>
                <div class="gallery-item"><img src="https://lh3.googleusercontent.com/pw/AP1GczORsjUrMYmNWbkcLqTT3NqaxJlUn-jnc-1p2HceFMMik3Np3kx7LO915PSuWIJmQiUG1qZSOK9-wXioHxeLmkfJoa8tlhkkPtjvSd16PIYqyOiAV9Y5sO0V_Z3xSGVFdpN4Y3RqFrMTkczDLuJ7y99A=w702-h1053-s-no-gm?authuser=0" alt="Youth 2"></div>
                <div class="gallery-item"><img src="https://lh3.googleusercontent.com/pw/AP1GczPmTPEuXr20cS0C0d5aNAtB_gMpw9xK1dcjlGpzKPWE2xTnHnJ6xxdiAjd0D3Mb6y3JV2qdr0hGnGa9zuYXz3Qb3MOubxY1-JE4CDrqLVvv2rQWCovVbKkwpV2vVsL66tM4HqsX3fStJLgNh7HcgaK8=w1876-h1053-s-no-gm?authuser=0" alt="Youth 3"></div>
                <div class="gallery-item"><img src="https://lh3.googleusercontent.com/pw/AP1GczML-gc39QomkYYJgefm2N2pZPmmIiyWriU33dU4aeG76BmDCJboIdoezv7ZQqYQGzJeLoHm1-EcRXbEPYYUZ3laSGJ5K1H1hMSe-n3jtjYgDJMH4xsNeCUPTj4XUzF_6epSRYUx4Th0XwdZX5zdCxmC=w1580-h1053-s-no-gm?authuser=0" alt="Youth 4"></div>
                <div class="gallery-item"><img src="https://lh3.googleusercontent.com/pw/AP1GczP75uuZMNKCcD7TqaB-i_IE3Xb8MgXfpUbcYOr-9ct7rPmF12iNR-r7id69jugTxrRnrQqVdYF5mt3JQS1-Gl3cEZ4OCIMwCedV-tjj7Yzy9ws7J6JfVDAglGeXa1uhRVofxxoB4phoA8FFvArylziy=w1568-h1053-s-no-gm?authuser=0" alt="Youth 5"></div>
                <div class="gallery-item"><img src="https://lh3.googleusercontent.com/pw/AP1GczPonkl1QTLyanEz1C3zKf9oj_1abfRwXr_9Q-T-mnDY6MiFqCEv7ttRh5MlgL7BMmDICaAiXnd2FPwgBzu1NOb5Dsjgzz7vO4PxjEuAyEjVCtNJsddhhmHDtEn-NdT-6zQ1r2CNvimB0p43qhezXVq3=w1870-h1053-s-no-gm?authuser=0" alt="Youth 6"></div>
            </div>
        </div>
    </section>

    <section class="section" data-s="6" id="s6">
        <div class="bg-cover"></div>
        <div class="s6-content-modern">
            <h2 class="section-global-title" data-i18n="wish_title"></h2>
            <div class="wish-form reveal">
                <div class="form-row">
                    <div class="field">
                        <input type="text" id="wish-name" data-i18n-placeholder="name_ph">
                    </div>
                    <div class="field">
                        <input type="text" id="wish-relation" data-i18n-placeholder="relation_ph">
                    </div>
                </div>
                
                <div class="form-row" style="margin-top: 1.2rem;">
                    <div class="field full-width">
                        <label class="attendance-label" data-i18n="attendance_question"></label>
                        
                        <div class="attendance-options">
                            <label class="attendance-card">
                                <input type="radio" name="attendance" value="yes" checked>
                                <div class="card-box">
                                    <span class="radio-icon">✔</span>
                                    <span data-i18n="attendance_yes"></span>
                                </div>
                            </label>
                            <label class="attendance-card">
                                <input type="radio" name="attendance" value="no">
                                <div class="card-box">
                                    <span class="radio-icon">✖</span>
                                    <span data-i18n="attendance_no"></span>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="field" style="margin-top: 1.2rem;">
                    <textarea id="wish-msg" rows="4" data-i18n-placeholder="msg_ph"></textarea>
                </div>
                <button class="submit-btn" id="submit-wish" data-i18n="submit_btn"></button>
                <div class="form-status-msg">
                    <span class="status-icon">⭐</span>
                    <span data-i18n="wish_success"></span>
                </div>
            </div>

            <div class="wishes-container reveal" style="margin-top: 2rem;">
                <div id="list-loader" class="list-loader" style="display: none;">
                    <div class="list-spinner"></div>
                </div>
                <div class="wishes-list" id="wishes-list"></div>
            </div>
        </div>
    </section>

    <section class="section" data-s="7" id="s7">
        <div class="bg-cover"></div>
        <div class="s7-content-modern reveal">
            <div class="quote-container">
                <div class="quote-mark">“”</div>
                <p class="thank-paragraph" data-i18n="thank_p1"></p>
                <p class="thank-paragraph" data-i18n="thank_p2"></p>
                <div class="notebook-footer-sign" data-i18n="thank_sign"></div>
                <div class="footer-divider">✦</div>
            </div>
            <footer class="main-footer">
                <div class="footer-logo">🎓</div>
                <p class="footer-thank" data-i18n="footer_title"></p>
            </footer>
        </div>
    </section>
    <div id="gallery-lightbox" class="lightbox-modal" style="display: none;">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img" src="" alt="Full View">
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
